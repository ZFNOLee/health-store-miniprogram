<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理员登录测试</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; background: #f5f5f5; }
    .card { background: white; padding: 30px; border-radius: 16px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #333; margin-bottom: 30px; }
    .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn-admin { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-staff { background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%); color: white; }
    .result { margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 8px; }
    .success { color: #56ab2f; }
    .error { color: #ff6b6b; }
    .info { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔐 管理员登录测试</h1>
    
    <div class="info">
      <strong>说明：</strong>这个页面用于测试管理员登录功能，排查权限问题。
    </div>

    <button class="btn btn-admin" onclick="login('admin')">👑 管理员登录</button>
    <button class="btn btn-staff" onclick="login('staff')">👨‍💼 店员登录</button>

    <div class="result" id="result" style="display: none;">
      <h3>登录结果：</h3>
      <pre id="resultContent"></pre>
    </div>
  </div>

  <script>
    const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? 'http://localhost:3000/api'
      : '/api';

    async function login(type) {
      const openid = type === 'admin' ? 'admin_openid_001' : 'staff_openid_001';
      const nickname = type === 'admin' ? '管理员' : '店员';

      console.log('尝试登录:', { openid, nickname });

      try {
        const res = await fetch(`${API_BASE}/users/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ openid, nickname })
        });

        const data = await res.json();
        console.log('登录响应:', data);

        const resultDiv = document.getElementById('result');
        const resultContent = document.getElementById('resultContent');

        if (data.success) {
          const role = data.data.role;
          const canAccess = role === 'admin' || role === 'staff';

          resultDiv.style.display = 'block';
          resultDiv.className = 'result ' + (canAccess ? 'success' : 'error');

          resultContent.innerHTML = `
✅ 登录成功！

用户信息：
- ID: ${data.data.id}
- 昵称：${data.data.nickname}
- 角色：<strong>${role}</strong>
- 等级：${data.data.member_level}
- 积分：${data.data.available_points}

权限检查：
- 角色是否有效：${canAccess ? '✅ 是' : '❌ 否'}
- 可以访问管理后台：${canAccess ? '✅ 可以' : '❌ 不可以'}

${canAccess ? '🎉 现在可以访问管理后台了！' : '⚠️ 权限不足，需要联系管理员'}
`;

          if (canAccess) {
            setTimeout(() => {
              if (confirm('登录成功！要跳转到管理后台吗？')) {
                window.location.href = 'http://localhost:8080/admin-page.html';
              }
            }, 1000);
          }
        } else {
          resultDiv.style.display = 'block';
          resultDiv.className = 'result error';
          resultContent.innerHTML = `❌ 登录失败：${data.message}`;
        }
      } catch (error) {
        console.error('登录错误:', error);
        const resultDiv = document.getElementById('result');
        const resultContent = document.getElementById('resultContent');
        resultDiv.style.display = 'block';
        resultDiv.className = 'result error';
        resultContent.innerHTML = `❌ 登录错误：${error.message}\n\n请检查后端服务是否运行：http://localhost:3000/api/health`;
      }
    }
  </script>
</body>
</html>
